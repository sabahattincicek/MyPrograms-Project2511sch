<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="assets/ic_launcher-playstore.png">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292e;
            --secondary-text: #586069;
            --card-bg: #fafafa;
            --accent-color: #0366d6;
            --border-color: #e1e4e8;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --text-color: #c9d1d9;
                --secondary-text: #8b949e;
                --card-bg: #161b22;
                --accent-color: #58a6ff;
                --border-color: #30363d;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .lang-switcher {
            text-align: right;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .lang-link {
            padding: 5px 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            text-decoration: none;
            color: var(--text-color);
        }
        .lang-link:hover { background-color: var(--card-bg); }

        /* Hero Section */
        header {
            text-align: center;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .dev-badge {
            background-color: var(--accent-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .mission-statement {
            font-size: 1.1rem;
            color: var(--secondary-text);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Content Sections */
        h2 { margin-top: 40px; border-left: 4px solid var(--accent-color); padding-left: 15px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            display: block;
            padding: 24px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .card strong { color: var(--accent-color); font-size: 1.2rem; display: block; margin-bottom: 8px; }

        /* Support Section */
        .support-container {
            margin-top: 60px;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 24px;
            text-align: center;
            border: 2px dashed var(--border-color);
        }

        .support-container h3 { font-size: 1.5rem; margin-bottom: 15px; }

        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--secondary-text);
        }

        a { color: var(--accent-color); text-decoration: none; }

        .github-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #24292e;
            color: #ffffff !important;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        .github-button:hover {
            background-color: #444d56;
        }
        @media (prefers-color-scheme: dark) {
            .github-button {
                background-color: #21262d;
                border: 1px solid #30363d;
            }
            .github-button:hover {
                background-color: #30363d;
            }
        }
        .github-profile-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: transparent;
            color: var(--accent-color) !important;
            padding: 10px 20px;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 15px;
            transition: all 0.2s;
        }
        .github-profile-button:hover {
            background-color: var(--accent-color);
            color: #ffffff !important;
        }
        .donate-container {
            margin-top: 80px;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 24px;
            text-align: center;
            border: 2px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .donate-container h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .donate-container p {
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 15px;
        }
        .donate-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--accent-color);
            color: white !important;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(3, 102, 214, 0.3);
        }

        .donate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(3, 102, 214, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>

<script>
    async function loadLanguage(lang) {
        try {
            const response = await fetch(`i18n/index/${lang}.json`);
            if (!response.ok) throw new Error('Dil dosyası yüklenemedi');

            const translations = await response.json();

            //sayfa basligini degistir
            if (translations.page_title) {
            document.title = translations.page_title;
        }

            // data-i18n niteliği olan tüm elementleri bul ve metni değiştir
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) {
                    el.innerHTML = translations[key];
                }
            });

            // Seçimi kaydet ve HTML lang niteliğini güncelle
            document.documentElement.lang = lang;
            localStorage.setItem('preferredLang', lang);
        } catch (error) {
            console.error('Hata:', error);
        }
    }

    function changeLang(lang) {
        loadLanguage(lang);
    }

    // Sayfa açıldığında:
    // 1. Kaydedilmiş dil var mı?
    // 2. Yoksa tarayıcı dili Türkçe mi?
    // 3. O da olmazsa İngilizce.
    const initialLang = localStorage.getItem('preferredLang') ||
                        (navigator.language.startsWith('tr') ? 'tr' : 'en');

    loadLanguage(initialLang);
</script>
