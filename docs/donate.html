<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support the Developer - MyPrograms</title>
    <link rel="icon" type="image/png" href="https://github.com/user-attachments/assets/9fc19e31-22ec-42e0-9dd9-c56e81394dde">
    <style>
        /* Mevcut CSS stillerin kalsın (profile-header, story-section, kreosus-container vb.) */
        :root { --bg-color: #ffffff; --text-color: #24292e; --secondary-text: #586069; --accent-color: #0366d6; --border-color: #e1e4e8; --card-bg: #fafafa; }
        @media (prefers-color-scheme: dark) { :root { --bg-color: #0d1117; --text-color: #c9d1d9; --secondary-text: #8b949e; --accent-color: #58a6ff; --border-color: #30363d; --card-bg: #161b22; } }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 40px 20px; background-color: var(--bg-color); color: var(--text-color); }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .nav-back a { text-decoration: none; color: var(--accent-color); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--card-bg); color: var(--text-color); font-weight: 600; cursor: pointer; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: var(--card-bg); min-width: 140px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 100; border-radius: 8px; border: 1px solid var(--border-color); top: 100%; padding: 5px 0; }
        .dropdown-content button { color: var(--text-color); padding: 12px 16px; border: none; background: none; width: 100%; text-align: left; cursor: pointer; }
        .dropdown-content button:hover { background-color: var(--border-color); }
        .dropdown:hover .dropdown-content { display: block; }
        .profile-header { text-align: center; margin-bottom: 40px; }
        .profile-header img { border-radius: 50%; border: 4px solid var(--accent-color); margin-bottom: 15px; }
        .story-section { background-color: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); }
        .kreosus-container { margin-top: 40px; text-align: center; padding: 20px; border-top: 2px solid var(--border-color); }
        h1, h2 { color: var(--text-color); }
        footer { margin-top: 60px; text-align: center; font-size: 0.9rem; color: var(--secondary-text); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-back">
        <a href="index.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span data-i18n="back_to_home_button"></span>
        </a>
    </div>

    <div class="lang-switcher">
        <div class="dropdown">
            <button class="dropbtn" id="current-lang" data-i18n="lang_button"></button>
            <div class="dropdown-content">
                <button onclick="changeLang('tr')">🇹🇷 Türkçe</button>
                <button onclick="changeLang('en')">🇺🇸 English</button>
            </div>
        </div>
    </div>
</div>

<div class="profile-header">
    <!-- Buraya kendi fotoğrafını veya bir avatar koyabilirsin -->
    <img src="https://github.com/sabahattincicek.png" width="120" height="120" alt="Developer Photo">
    <h1 data-i18n="profile_greeting"></h1>
    <p data-i18n="profile_sub"></p>
</div>

<div id="story-content" class="story-section"></div>

<div class="kreosus-container">
    <h3 data-i18n="support_title"></h3>
    <p data-i18n="support_desc"></p>
    <div id="kreosus" data-id="5442" data-start-page="0" data-bg-color="ffffff" data-iframe-api="true"></div>
</div>

<footer>
    <p data-i18n="footer_signature"></p>
</footer>
<script>
    async function loadLanguage(lang) {
        const fetchPath = `i18n/donate/${lang}.json`;
        try {
            const response = await fetch(fetchPath);
            const translations = await response.json();

            // 1. Sabit alanlar
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) el.innerHTML = translations[key];
            });
            if(translations.donate_page_title) document.title = translations.donate_page_title;

            // 2. Dinamik Hikaye Bölümü
            const container = document.getElementById('story-content');
            container.innerHTML = "";
            translations.story_sections.forEach(section => {
                if (section.title) container.innerHTML += `<h2>${section.title}</h2>`;
                section.body.forEach(p => {
                    container.innerHTML += `<p>${p}</p>`;
                });
            });

            document.documentElement.lang = lang;
            localStorage.setItem('preferredLang', lang);
        } catch (error) { console.error('Hata:', error); }
    }

    function changeLang(lang) { loadLanguage(lang); }

    // Kreosus Widget Yükleyici
    (function (d, s, id) {
        var js, kjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = 'https://kreosus.com/public/kreosus/iframe/js/iframe-api.js';
        kjs.parentNode.insertBefore(js, kjs);
    }(document, 'script', 'kreosus-iframe-api'));

    const initialLang = localStorage.getItem('preferredLang') || (navigator.language.startsWith('tr') ? 'tr' : 'en');
    loadLanguage(initialLang);
</script>

</body>
</html>
