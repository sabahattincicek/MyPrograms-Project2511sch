<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Use - MyPrograms</title>
    <link rel="icon" type="image/png" href="assets/ic_launcher-playstore.png">
    <style>
        :root { --bg-color: #ffffff; --text-color: #24292e; --secondary-text: #586069; --accent-color: #0366d6; --border-color: #e1e4e8; --card-bg: #fafafa; }
        @media (prefers-color-scheme: dark) { :root { --bg-color: #0d1117; --text-color: #c9d1d9; --secondary-text: #8b949e; --accent-color: #58a6ff; --border-color: #30363d; --card-bg: #161b22; } }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 850px; margin: 0 auto; padding: 40px 20px; background-color: var(--bg-color); color: var(--text-color); }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .nav-back a { text-decoration: none; color: var(--accent-color); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--card-bg); color: var(--text-color); font-weight: 600; cursor: pointer; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: var(--card-bg); min-width: 140px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 100; border-radius: 8px; border: 1px solid var(--border-color); top: 100%; padding: 5px 0; }
        .dropdown-content button { color: var(--text-color); padding: 12px 16px; border: none; background: none; width: 100%; text-align: left; cursor: pointer; }
        .dropdown-content button:hover { background-color: var(--border-color); }
        .dropdown:hover .dropdown-content { display: block; }
        h1 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        h2 { margin-top: 40px; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 5px;}
        h3 { margin-top: 30px; }
        hr { border: 0; border-top: 1px solid var(--border-color); margin: 40px 0; }
        .last-updated { color: var(--secondary-text); font-style: italic; margin-bottom: 20px; display: block; }
        footer { margin-top: 60px; text-align: center; font-size: 0.9rem; color: var(--secondary-text); border-top: 1px solid var(--border-color); padding-top: 20px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-back">
        <a href="index.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span data-i18n="back_to_home_button"></span>
        </a>
    </div>

    <div class="lang-switcher">
        <div class="dropdown">
            <button class="dropbtn" id="current-lang" data-i18n="lang_button"></button>
            <div class="dropdown-content">
                <button onclick="changeLang('tr')">🇹🇷 Türkçe</button>
                <button onclick="changeLang('en')">🇺🇸 English</button>
            </div>
        </div>
    </div>
</div>
<h1 data-i18n="terms_title"></h1>
<p class="last-updated" data-i18n="last_updated"></p>

<div id="terms-content"></div>

<footer>
    <p data-i18n="footer_copyright"></p>
</footer>

<script>
    async function loadLanguage(lang) {
        // Dosya yolunu Kullanım Koşulları klasörüne göre ayarla
        const fetchPath = `i18n/terms_of_use/${lang}.json`;

        try {
            const response = await fetch(fetchPath);
            if (!response.ok) throw new Error(`Dosya bulunamadı: ${fetchPath}`);
            const translations = await response.json();

            // 1. Sabit alanları (Title, Button, Footer) doldur
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) el.innerHTML = translations[key];
            });

            // 2. Dinamik İçerik (terms-content)
            const container = document.getElementById('terms-content');
            container.innerHTML = ""; // Temizle

            if (translations.content_sections) {
                translations.content_sections.forEach((section, index) => {
                    const sectionEl = document.createElement('section');

                    if (section.title) {
                        sectionEl.innerHTML += `<h2>${section.title}</h2>`;
                    }

                    section.body.forEach(item => {
                        // Linkleri (mailto veya http) tıklanabilir yapmak için basit fonksiyon
                        const linkify = (text) => {
                            const urlRegex = /(https?:\/\/[^\s]+|mailto:[^\s]+)/g;
                            return text.replace(urlRegex, (url) => {
                                const label = url.replace('mailto:', '');
                                return `<a href="${url}" target="_blank">${label}</a>`;
                            });
                        };

                        if (item.type === 'p') {
                            sectionEl.innerHTML += `<p>${linkify(item.content)}</p>`;
                        } else if (item.type === 'h3') {
                            sectionEl.innerHTML += `<h3>${item.content}</h3>`;
                        } else if (item.type === 'ul') {
                            const lis = item.content.map(li => `<li>${linkify(li)}</li>`).join('');
                            sectionEl.innerHTML += `<ul>${lis}</ul>`;
                        }
                    });

                    container.appendChild(sectionEl);

                    if (index < translations.content_sections.length - 1) {
                        container.appendChild(document.createElement('hr'));
                    }
                });
            }

            document.documentElement.lang = lang;
            localStorage.setItem('preferredLang', lang);
        } catch (error) {
            console.error('Yükleme Hatası:', error);
        }
    }

    function changeLang(lang) { loadLanguage(lang); }

    const initialLang = localStorage.getItem('preferredLang') || (navigator.language.startsWith('tr') ? 'tr' : 'en');
    loadLanguage(initialLang);
</script>

</body>
</html>
